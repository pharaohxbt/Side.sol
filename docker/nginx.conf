worker_processes 1;

events {
  worker_connections 1024;
}

http {
  client_max_body_size 20m;
  proxy_buffer_size    128k;
  proxy_buffers        8 256k;
  proxy_busy_buffers_size 256k;

  server {
    listen 54321;

    # ── REST API  (PostgREST) ─────────────────────────────────────
    location /rest/v1/ {
      # Strip upstream CORS headers so we don't send duplicates
      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;
      proxy_hide_header Access-Control-Allow-Credentials;

      # Respond to preflight directly — don't proxy OPTIONS to PostgREST
      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin'      $http_origin always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, PATCH, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'     'apikey, Authorization, Content-Type, Content-Profile, Accept-Profile, Prefer, Range, X-Client-Info' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Max-Age'           '1728000' always;
        return 204;
      }

      # Inject CORS on every real response
      add_header 'Access-Control-Allow-Origin'      $http_origin always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;

      proxy_pass         http://rest:3000/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Auth API  (GoTrue) ────────────────────────────────────────
    location /auth/v1/ {
      # Strip upstream CORS headers so we don't send duplicates
      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;
      proxy_hide_header Access-Control-Allow-Credentials;

      # Respond to preflight directly — don't proxy OPTIONS to GoTrue
      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin'      $http_origin always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, PATCH, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'     'apikey, Authorization, Content-Type, X-Client-Info, X-Supabase-Api-Version' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Max-Age'           '1728000' always;
        return 204;
      }

      # Inject CORS on every real response
      add_header 'Access-Control-Allow-Origin'      $http_origin always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;

      proxy_pass         http://auth:9999/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}
